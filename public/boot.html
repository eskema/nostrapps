<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>napp boot</title>
  </head>
  <body>
    <script>
      function reportError(err) {
        try {
          window.parent.postMessage(
            {
              __nostrapps: "napp-boot-error",
              error: err?.message || String(err)
            },
            "*"
          )
        } catch {
          // parent gone
        }
      }

      window.addEventListener("error", e => reportError(e.error || e.message))
      window.addEventListener("unhandledrejection", e => reportError(e.reason))
      ;(async () => {
        const DB_NAME = `files-${location.origin.split("://")[1]}`
        const DB_VERSION = 1
        const STORE = "files"

        function openDB() {
          return new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, DB_VERSION)
            req.onupgradeneeded = () => {
              const db = req.result
              if (!db.objectStoreNames.contains(STORE)) {
                db.createObjectStore(STORE, { keyPath: "path" })
              }
            }
            req.onsuccess = () => resolve(req.result)
            req.onerror = () => reject(req.error)
          })
        }

        async function clearAll() {
          const db = await openDB()
          return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE, "readwrite")
            tx.objectStore(STORE).clear()
            tx.oncomplete = () => {
              try {
                db.close()
              } catch {}
              resolve()
            }
            tx.onerror = () => {
              try {
                db.close()
              } catch {}
              reject(tx.error)
            }
          })
        }

        async function wipeAll() {
          // First clear known file store. Even if later deleteDatabase() gets
          // blocked by a still-closing worker connection, app files are gone.
          try {
            await clearAll()
          } catch {}

          // IndexedDB — every database at this origin
          try {
            if (indexedDB.databases) {
              const dbs = await indexedDB.databases()
              await Promise.all(
                dbs.map(
                  d =>
                    new Promise(resolve => {
                      const req = indexedDB.deleteDatabase(d.name)
                      req.onsuccess = () => resolve()
                      req.onerror = () => resolve()
                      req.onblocked = () => resolve()
                    })
                )
              )
            } else {
              // older browsers: at least delete the one we know about
              await new Promise(resolve => {
                const req = indexedDB.deleteDatabase(DB_NAME)
                req.onsuccess = () => resolve()
                req.onerror = () => resolve()
                req.onblocked = () => resolve()
              })
            }
          } catch {}

          try {
            localStorage.clear()
          } catch {}
          try {
            sessionStorage.clear()
          } catch {}

          if (typeof caches !== "undefined") {
            try {
              const keys = await caches.keys()
              await Promise.all(keys.map(k => caches.delete(k)))
            } catch {}
          }

          if (navigator.serviceWorker?.getRegistrations) {
            try {
              const regs = await navigator.serviceWorker.getRegistrations()
              await Promise.all(regs.map(r => r.unregister()))
            } catch {}
          }
        }

        async function putFile(path, body, mime) {
          const db = await openDB()
          return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE, "readwrite")
            tx.objectStore(STORE).put({ path, body, mime })
            tx.oncomplete = () => {
              try {
                db.close()
              } catch {}
              resolve()
            }
            tx.onerror = () => {
              try {
                db.close()
              } catch {}
              reject(tx.error)
            }
          })
        }

        try {
          await navigator.serviceWorker.register("/sw.js")
          await navigator.serviceWorker.ready
        } catch (err) {
          reportError(err)
          return
        }

        window.addEventListener("message", async event => {
          const data = event.data
          if (!data) return
          if (data.__nostrapps === "napp-install") {
            try {
              await clearAll()
              for (const f of data.files) {
                await putFile(f.path, f.body, f.mime)
              }
              event.source.postMessage(
                {
                  __nostrapps: "napp-install-done",
                  fileCount: data.files.length
                },
                event.origin
              )
            } catch (err) {
              event.source.postMessage(
                { __nostrapps: "napp-install-error", error: err.message },
                event.origin
              )
            }
          } else if (data.__nostrapps === "napp-dev-install") {
            try {
              event.source.postMessage({ __nostrapps: "napp-dev-install-done" }, event.origin)

              // Keep this iframe alive as relay between SW and host
              // Listen for file requests from SW
              navigator.serviceWorker.addEventListener("message", swEvent => {
                if (swEvent.data?.__nostrapps === "sw-read-file") {
                  window.parent.postMessage(
                    {
                      __nostrapps: "napp-dev-read-file",
                      nappId: data.nappId,
                      path: swEvent.data.path,
                      requestId: swEvent.data.requestId
                    },
                    "*"
                  )
                }
              })
              // Listen for file responses from host and forward to SW
              window.addEventListener("message", hostEvent => {
                if (hostEvent.data?.__nostrapps === "napp-dev-file-result") {
                  if (navigator.serviceWorker.controller) {
                    navigator.serviceWorker.controller.postMessage({
                      __nostrapps: "sw-file-result",
                      requestId: hostEvent.data.requestId,
                      body: hostEvent.data.body,
                      mime: hostEvent.data.mime,
                      error: hostEvent.data.error
                    })
                  }
                }
              })
            } catch (err) {
              event.source.postMessage(
                { __nostrapps: "napp-dev-install-error", error: err.message },
                event.origin
              )
            }
          } else if (data.__nostrapps === "napp-wipe") {
            try {
              await wipeAll()
              event.source.postMessage({ __nostrapps: "napp-wipe-done" }, event.origin)
            } catch (err) {
              event.source.postMessage(
                { __nostrapps: "napp-wipe-error", error: err.message },
                event.origin
              )
            }
          }
        })

        window.parent.postMessage({ __nostrapps: "napp-boot-ready" }, "*")
      })()
    </script>
  </body>
</html>
