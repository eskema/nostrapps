<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>nostrapps</title>
    <link rel="stylesheet" href="/src/launcher.css" />
  </head>
  <body>
    <header>
      <div class="headerbar">
        <h1>nostr<br /><span>n</span>apps</h1>
        <form id="launch-form">
          <div class="input-wrap">
            <input
              id="nsite-input"
              placeholder="naddr / nsite /…"
              autocomplete="off"
              spellcheck="false"
            />
            <div id="suggestions" hidden></div>
          </div>
          <input type="file" id="local-folder" webkitdirectory multiple hidden />
        </form>
      </div>
    </header>
    <main id="stage">
      <button
        id="tile-windows"
        type="button"
        title="Tile open windows"
        aria-label="Tile open windows"
      >
        ▦
      </button>
      <button
        id="pack-toggle"
        type="button"
        title="Auto-pack on move/resize"
        aria-label="Auto-pack on move/resize"
        aria-pressed="false"
      >
        ⊟
      </button>
    </main>

    <dialog id="permission-prompt">
      <form method="dialog">
        <h3>Permission request</h3>
        <p>
          Napp <code data-perm-nappid></code> wants to use
          <code data-perm-method></code>
        </p>
        <menu class="perm-actions">
          <button value="deny-always">Deny always</button>
          <button value="deny-once">Deny</button>
          <button value="allow-once">Allow once</button>
          <button value="allow-always" autofocus>Allow always</button>
        </menu>
      </form>
    </dialog>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
